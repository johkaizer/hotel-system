<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hotel Manager — Login</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="login-page">
  <div class="login-bg"></div>
  <div class="login-card">
    <div class="login-logo">
      <span class="icon">🏨</span>
      <h1>Hotel Manager</h1>
      <p>Sistema de Gestão Hoteleira</p>
    </div>
    <form class="login-form" id="login-form">
      <div class="form-group">
        <label>Usuário</label>
        <input type="text" id="username" placeholder="admin" value="admin" autocomplete="username">
      </div>
      <div class="form-group">
        <label>Senha</label>
        <input type="password" id="password" placeholder="••••••••" value="admin123" autocomplete="current-password">
      </div>
      <p id="error-msg" style="color:var(--danger);font-size:13px;display:none"></p>
      <button type="submit" class="btn btn-primary login-btn" id="login-btn">
        <span id="btn-text">Entrar</span>
      </button>
    </form>
    <p style="text-align:center;margin-top:20px;font-size:12px;color:var(--text-muted)">
      Demo: <strong>admin</strong> / <strong>admin123</strong>
    </p>
  </div>
</div>
<div id="toast-container"></div>
<script src="js/api.js"></script>
<script>
  if (getToken()) window.location.href = '/dashboard.html';
  document.getElementById('login-form').addEventListener('submit', async e => {
    e.preventDefault();
    const btn = document.getElementById('login-btn');
    const errMsg = document.getElementById('error-msg');
    btn.disabled = true;
    document.getElementById('btn-text').textContent = 'Entrando...';
    errMsg.style.display = 'none';
    try {
      const data = await apiFetch('/auth/login', { method: 'POST', body: { username: document.getElementById('username').value.trim(), password: document.getElementById('password').value } });
      setAuth(data.token, data.user);
      window.location.href = '/dashboard.html';
    } catch (err) {
      errMsg.textContent = err.message;
      errMsg.style.display = 'block';
      btn.disabled = false;
      document.getElementById('btn-text').textContent = 'Entrar';
    }
  });
</script>
</body>
</html>
